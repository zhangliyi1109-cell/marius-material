<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MARIUS 纽扣实时库存 · 设计师选扣</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f2ef;
      --card: #fff;
      --ink: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #2c3e50;
      --gold: #b8860b;
      --border: rgba(0,0,0,.08);
      --shadow: 0 8px 30px rgba(0,0,0,.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1a1a1a 0%, #3d4f5f 100%);
      color: #fff;
      padding: 1.25rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 4px 20px rgba(0,0,0,.15);
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
      justify-content: space-between;
    }
    h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: .02em; }
    .subtitle { font-size: .8rem; opacity: .75; margin-top: .2rem; }
    .header-actions { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
    .btn {
      border: none;
      border-radius: 8px;
      padding: .5rem 1rem;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s, opacity .15s;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: #fff; color: var(--accent); }
    .btn-ghost { background: rgba(255,255,255,.15); color: #fff; }
    .status-pill {
      font-size: .75rem;
      padding: .35rem .75rem;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
    }
    main { max-width: 1400px; margin: 0 auto; padding: 1.25rem 1.5rem 3rem; }
    .filters {
      background: var(--card);
      border-radius: 14px;
      padding: 1rem 1.25rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 1.25rem;
      display: grid;
      gap: .85rem;
    }
    .filter-row { display: flex; flex-wrap: wrap; gap: .6rem; align-items: center; }
    .filter-row label { font-size: .75rem; color: var(--muted); font-weight: 600; min-width: 4.5rem; }
    input[type="search"], select {
      flex: 1;
      min-width: 180px;
      padding: .55rem .75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .9rem;
    }
    .chips { display: flex; flex-wrap: wrap; gap: .4rem; }
    .chip {
      padding: .3rem .65rem;
      border-radius: 999px;
      font-size: .75rem;
      border: 1px solid var(--border);
      background: #fafafa;
      cursor: pointer;
      user-select: none;
      transition: all .15s;
    }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .stats {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      font-size: .85rem;
      color: var(--muted);
    }
    .stats strong { color: var(--ink); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    .card {
      background: var(--card);
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      transition: transform .2s, box-shadow .2s;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 40px rgba(0,0,0,.1);
    }
    .card-img-wrap {
      aspect-ratio: 1;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card-img-wrap .no-img {
      color: var(--muted);
      font-size: .8rem;
      text-align: center;
      padding: 1rem;
    }
    .stock-badge {
      position: absolute;
      top: .6rem;
      right: .6rem;
      background: rgba(26,26,26,.85);
      color: #fff;
      font-size: .7rem;
      font-weight: 700;
      padding: .25rem .55rem;
      border-radius: 6px;
    }
    .stock-badge.high { background: #166534; }
    .tag-badge {
      position: absolute;
      top: .6rem;
      left: .6rem;
      font-size: .65rem;
      font-weight: 600;
      padding: .2rem .5rem;
      border-radius: 6px;
      background: rgba(184, 134, 11, .92);
      color: #fff;
    }
    .tag-badge.running { background: rgba(37, 99, 235, .9); }
    .tag-badge.failed { background: rgba(185, 28, 28, .9); }
    .tag-badge.text_only { background: rgba(107, 107, 107, .85); }
    .card.tag-pending .card-desc { color: #888; font-style: italic; }
    .card-body { padding: .9rem 1rem 1rem; flex: 1; display: flex; flex-direction: column; gap: .45rem; }
    .card-title {
      font-size: .9rem;
      font-weight: 600;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta { font-size: .72rem; color: var(--muted); }
    .card-desc {
      font-size: .78rem;
      color: #444;
      line-height: 1.45;
      flex: 1;
    }
    .tag-list { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .25rem; }
    .tag {
      font-size: .65rem;
      padding: .15rem .45rem;
      border-radius: 4px;
      background: #f0ebe3;
      color: #5c4a32;
    }
    .tag.style { background: #e8eef3; color: #2c3e50; }
    .tag.hole { background: #ede8f7; color: #4a3d6b; }
    .variants {
      margin-top: .5rem;
      padding-top: .5rem;
      border-top: 1px dashed var(--border);
      font-size: .72rem;
    }
    .variants summary {
      cursor: pointer;
      color: var(--muted);
      font-weight: 600;
    }
    .variant-line {
      display: flex;
      justify-content: space-between;
      gap: .5rem;
      padding: .2rem 0;
      color: #444;
    }
    .variant-line span:last-child { font-weight: 600; white-space: nowrap; }
    .loading, .error {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }
    .error { color: #b91c1c; }
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr 1fr; gap: .65rem; }
      .card-title { font-size: .8rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>MARIUS 纽扣实时库存</h1>
        <p class="subtitle">观远 BI 实时数据 · 视觉标签辅助选扣
          <a href="/fabric/" target="_blank" style="color:rgba(255,255,255,.85);margin-left:.5rem;font-size:.75rem">面料看板 →</a>
        </p>
      </div>
      <div class="header-actions">
        <span class="status-pill" id="statusText">加载中…</span>
        <button class="btn btn-ghost" id="btnTagRun" title="对未打标 SKU 重新入队">补打标</button>
        <button class="btn btn-ghost" id="btnRefresh">刷新库存</button>
      </div>
    </div>
  </header>

  <main>
    <section class="filters">
      <div class="filter-row">
        <label>搜索</label>
        <input type="search" id="searchInput" placeholder="名称、编码、关键词、风格…" />
        <label>最低库存</label>
        <select id="minStock">
          <option value="100" selected>≥ 100</option>
          <option value="300">≥ 300</option>
          <option value="500">≥ 500</option>
          <option value="1000">≥ 1000</option>
          <option value="0">全部</option>
        </select>
        <label>展示</label>
        <select id="viewMode">
          <option value="product" selected>按款式（合并尺码）</option>
          <option value="sku">按 SKU 明细</option>
        </select>
      </div>
      <div class="filter-row">
        <label>纽扣类型</label>
        <div class="chips" id="typeChips"></div>
      </div>
      <div class="filter-row">
        <label>孔型</label>
        <div class="chips" id="holeChips"></div>
      </div>
      <div class="filter-row">
        <label>风格</label>
        <div class="chips" id="styleChips"></div>
      </div>
    </section>

    <div class="stats" id="statsBar"></div>
    <div id="content" class="loading">正在从 BI 拉取库存…</div>
  </main>

  <script>
    const BASE = '/button';
    const state = { type: '', hole: '', style: '', items: [], tagPoll: null };

    function fmtTime(ts) {
      if (!ts) return '—';
      const d = new Date(ts * 1000);
      return d.toLocaleString('zh-CN', { hour12: false });
    }

    function stockClass(n) {
      if (n >= 2000) return 'high';
      return '';
    }

    function renderChips(container, items, key, allLabel) {
      container.innerHTML = '';
      const all = document.createElement('span');
      all.className = 'chip' + (state[key] === '' ? ' active' : '');
      all.textContent = allLabel;
      all.onclick = () => { state[key] = ''; renderChipsActive(); loadItems(); };
      container.appendChild(all);
      items.forEach(v => {
        const el = document.createElement('span');
        el.className = 'chip' + (state[key] === v ? ' active' : '');
        el.textContent = v;
        el.onclick = () => {
          state[key] = state[key] === v ? '' : v;
          renderChipsActive();
          loadItems();
        };
        container.appendChild(el);
      });
    }

    function renderChipsActive() {
      ['typeChips','holeChips','styleChips'].forEach(id => {
        const key = id === 'typeChips' ? 'type' : id === 'holeChips' ? 'hole' : 'style';
        document.querySelectorAll('#' + id + ' .chip').forEach((el, i) => {
          if (i === 0) el.classList.toggle('active', state[key] === '');
          else el.classList.toggle('active', el.textContent === state[key]);
        });
      });
    }

    function buildQuery(refresh) {
      const p = new URLSearchParams();
      p.set('min_stock', document.getElementById('minStock').value);
      const q = document.getElementById('searchInput').value.trim();
      if (q) p.set('q', q);
      if (state.type) p.set('type', state.type);
      if (state.hole) p.set('hole', state.hole);
      if (state.style) p.set('style', state.style);
      p.set('view', document.getElementById('viewMode').value);
      if (refresh) p.set('refresh', '1');
      return p.toString();
    }

    async function loadMeta() {
      const res = await fetch(BASE + '/api/meta');
      const data = await res.json();
      renderChips(document.getElementById('typeChips'), data.types || [], 'type', '全部');
      renderChips(document.getElementById('holeChips'), data.holes || [], 'hole', '全部');
      renderChips(document.getElementById('styleChips'), data.styles || [], 'style', '全部');
    }

    function tagBadgeHtml(status) {
      const map = {
        pending: ['分析中…', 'tag-badge'],
        running: ['打标中', 'tag-badge running'],
        failed: ['打标失败', 'tag-badge failed'],
        text_only: ['仅文本标签', 'tag-badge text_only'],
      };
      const m = map[status];
      if (!m) return '';
      return `<span class="${m[1]}">${m[0]}</span>`;
    }

    function updateTagStatusLine(jobs) {
      if (!jobs) return;
      const q = jobs.queue_size || 0;
      const run = jobs.running || 0;
      const pend = (jobs.db_counts && jobs.db_counts.pending) || 0;
      const active = q + run + pend;
      const extra = active
        ? ` · 打标 ${active} 进行中`
        : (jobs.db_counts && jobs.db_counts.done ? '' : '');
      const el = document.getElementById('statusText');
      const base = el.dataset.base || el.textContent.split(' · 打标')[0];
      el.dataset.base = base;
      el.textContent = base + (active ? ` · 打标队列 ${active}` : ' · 打标空闲');
    }

    async function pollTagJobs() {
      try {
        const res = await fetch(BASE + '/api/tag-jobs');
        const jobs = await res.json();
        updateTagStatusLine(jobs);
        const active = (jobs.queue_size || 0) + (jobs.running || 0) +
          ((jobs.db_counts && jobs.db_counts.pending) || 0);
        if (active > 0) {
          await loadItems();
        } else if (state.tagPoll) {
          clearInterval(state.tagPoll);
          state.tagPoll = null;
        }
      } catch (_) {}
    }

    function startTagPolling() {
      if (state.tagPoll) return;
      state.tagPoll = setInterval(pollTagJobs, 5000);
    }

    function renderVariants(item) {
      if (!item.variants || item.variants.length <= 1) return '';
      const lines = item.variants.map(v =>
        `<div class="variant-line"><span>${v.颜色规格 || v.尺寸 || v.物料明细编码}</span><span>${Math.round(v.可配库存)}</span></div>`
      ).join('');
      return `<details class="variants" open><summary>${item.sku_count} 个尺码/SKU</summary>${lines}</details>`;
    }

    function renderCard(item) {
      const tags = item.视觉标签 || {};
      const kws = (tags.关键词 || []).slice(0, 8);
      const img = item.主图
        ? `<img src="${item.主图}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'no-img\\'>图片加载失败</div>'" />`
        : '<div class="no-img">暂无主图</div>';
      const stock = item.可配库存合计 != null ? item.可配库存合计 : item.可配库存;
      const badge = item.sku_count > 1
        ? `${Math.round(stock)} · ${item.sku_count}码`
        : `${Math.round(stock)}`;
      const stockTitle = item.sku_count > 1
        ? '可配库存（该款各尺码 SKU 合计）'
        : '可配库存';
      const tagHtml = kws.map(k => {
        let cls = 'tag';
        if ((tags.风格 || []).includes(k)) cls += ' style';
        if (k === tags.孔型) cls += ' hole';
        return `<span class="${cls}">${k}</span>`;
      }).join('');
      const metaLine = item.sku_count > 1
        ? `${item.纽扣类型 || ''} · ${item.颜色描述 || item.颜色 || ''} · 多尺码`
        : `${item.纽扣类型 || ''} · ${item.颜色规格 || item.尺寸 || ''}`;
      const tagSt = item.tag_status || 'done';
      const cardCls = tagSt === 'pending' || tagSt === 'running' ? 'card tag-pending' : 'card';
      const desc = (tagSt === 'pending' || tagSt === 'running')
        ? '（视觉分析进行中，稍后自动更新…）'
        : (tags.视觉描述 || '（无视觉描述）');
      return `
        <article class="${cardCls}">
          <div class="card-img-wrap">
            ${img}
            ${tagBadgeHtml(tagSt)}
            <span class="stock-badge ${stockClass(stock)}" title="${stockTitle}">可配 ${badge}</span>
          </div>
          <div class="card-body">
            <div class="card-title">${item.物料名称 || '—'}</div>
            <div class="card-meta">${metaLine}</div>
            <div class="card-meta">${item.物料编码 || ''}</div>
            <p class="card-desc">${desc}</p>
            <div class="tag-list">${tagHtml}</div>
            ${renderVariants(item)}
          </div>
        </article>`;
    }

    async function loadItems(refresh = false) {
      const content = document.getElementById('content');
      content.className = 'loading';
      content.textContent = refresh ? '正在刷新 BI 库存…' : '加载中…';
      try {
        const res = await fetch(BASE + '/api/buttons?' + buildQuery(refresh));
        const data = await res.json();
        state.items = data.items || [];
        const src = data.source || 'bi';
        const warn = data.warning ? ` · ${data.warning}` : '';
        document.getElementById('statusText').textContent =
          `${data.total} 款 · ${fmtTime(data.fetched_at)} · ${src}${data.cached ? ' (缓存)' : ''}${warn}`;
        const viewLabel = data.view === 'product' ? '款式' : 'SKU';
        const skuNote = data.sku_total && data.sku_total !== data.total
          ? `（对应 <strong>${data.sku_total}</strong> 条 SKU）` : '';
        document.getElementById('statsBar').innerHTML =
          `显示 <strong>${data.total}</strong> 个${viewLabel}${skuNote} · 库内 <strong>${data.total_all}</strong> 条原始记录 · 按库存降序`;
        if (!state.items.length) {
          content.className = 'loading';
          content.textContent = '没有匹配的扣子，请调整筛选条件';
          return;
        }
        content.className = 'grid';
        content.innerHTML = state.items.map(renderCard).join('');
        const pendingCards = state.items.filter(i =>
          i.tag_status === 'pending' || i.tag_status === 'running').length;
        if (pendingCards) startTagPolling();
      } catch (e) {
        content.className = 'error';
        content.textContent = '加载失败: ' + e.message;
      }
    }

    let searchTimer;
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => loadItems(), 300);
    });
    document.getElementById('minStock').addEventListener('change', () => loadItems());
    document.getElementById('viewMode').addEventListener('change', () => loadItems());
    document.getElementById('btnRefresh').addEventListener('click', () => loadItems(true));
    document.getElementById('btnTagRun').addEventListener('click', async () => {
      await fetch(BASE + '/api/tag-jobs/run', { method: 'POST' });
      startTagPolling();
      await loadItems(true);
    });

    (async () => {
      await loadMeta();
      await loadItems();
      pollTagJobs();
    })();
  </script>
</body>
</html>
