<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 · MARIUS 物料库存</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #1a1a1a 0%, #3d4f5f 50%, #6b4f3a 100%);
      color: #fff;
      padding: 2rem;
    }
    .card {
      width: 100%;
      max-width: 400px;
      padding: 2rem 1.75rem;
      border-radius: 16px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(8px);
    }
    h1 { font-size: 1.35rem; margin-bottom: .35rem; letter-spacing: .04em; }
    .sub { opacity: .75; font-size: .85rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: .8rem; opacity: .85; margin-bottom: .35rem; }
    input {
      width: 100%;
      padding: .7rem .85rem;
      margin-bottom: 1rem;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(0,0,0,.25);
      color: #fff;
      font-size: .95rem;
    }
    input:focus { outline: none; border-color: rgba(255,255,255,.5); }
    button {
      width: 100%;
      padding: .75rem;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,.92);
      color: #1a1a1a;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .12s, opacity .12s;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); opacity: .9; }
    .err {
      margin-bottom: 1rem;
      padding: .6rem .75rem;
      border-radius: 8px;
      background: rgba(220, 80, 80, .25);
      border: 1px solid rgba(255, 120, 120, .35);
      font-size: .82rem;
      display: none;
    }
    .err.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>MARIUS 物料库存</h1>
    <p class="sub">请登录后访问库存看板</p>
    <div id="err" class="err">用户名或密码错误</div>
    <form method="post" action="/login">
      <input type="hidden" name="next" id="next" value="/" />
      <label for="username">用户名</label>
      <input id="username" name="username" type="text" autocomplete="username" required autofocus />
      <label for="password">密码</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />
      <button type="submit">登录</button>
    </form>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    if (params.get("error")) document.getElementById("err").classList.add("show");
    const next = params.get("next");
    if (next && next.startsWith("/")) document.getElementById("next").value = next;
  </script>
</body>
</html>
